name: tests

on:
  push:
    branches: [main]
  pull_request:
  # Manual "Run workflow" button in the Actions tab — lets us test CI on a
  # feature branch without pushing to main or opening a PR.
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check custom_components/dess_monitor_local tests

  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        # The pure-logic suite needs no Home Assistant — tests/conftest.py
        # stubs the package parents so the HA-free modules import standalone.
        run: pip install pytest pytest-cov

      - name: Run pure-logic tests with coverage
        # -v names every test; -ra overrides the repo's "-q". Entity tests
        # (test_entities.py) self-skip here via importorskip — no HA on this
        # matrix. Coverage is reported, not gated.
        run: >
          python -m pytest -v -o addopts="-ra --durations=10"
          --cov=custom_components/dess_monitor_local --cov-report=term-missing

  hass:
    # Installs Home Assistant (via pytest-homeassistant-custom-component,
    # which pins a compatible HA) and runs the HA-dependent tests: the
    # lightweight entity tests and the full config-entry lifecycle tests.
    # This is what catches integration-load regressions (e.g. a missing
    # enum re-export) and async setup/unload issues. POSIX-only — pytest-hacc
    # imports fcntl, so it can't run on the Windows dev box.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test deps (pulls a pinned Home Assistant)
        run: pip install -r requirements-test.txt
      - name: Run HA-dependent tests
        # Only the HA tests here — the pure/async suite runs on the
        # 3.12/3.13 matrix above, free of pytest-hacc's socket/loop guards.
        run: python -m pytest -v -o addopts="-ra" tests/test_entities.py tests/test_setup_hass.py
