name: validate

# Home Assistant custom-component correctness checks that pytest can't
# cover: manifest.json structure / required keys (hassfest) and HACS
# repository requirements (hacs.json, brands, structure).

on:
  push:
    # TEMP: ci/** included so this feature branch triggers CI on push.
    # Revert to just [main] before merging.
    branches: [main, "ci/**"]
  pull_request:
  # Manual "Run workflow" button in the Actions tab.
  workflow_dispatch:
  # Catch upstream HA/HACS rule changes even without a code push.
  schedule:
    - cron: "0 6 * * 1"

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

